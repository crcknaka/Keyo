name: Release

# Push a tag like v1.7 and this builds the signed release APK and publishes a GitHub release
# with it. Signing material comes from repository secrets:
#   RELEASE_KEYSTORE_B64     — base64 of keyo-release.jks
#   RELEASE_STORE_PASSWORD   — keystore password
#   RELEASE_KEY_ALIAS        — key alias
#   RELEASE_KEY_PASSWORD     — key password
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the release + upload the APK

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Restore release signing material
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > keyo-release.jks
          {
            echo "storeFile=keyo-release.jks"
            echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}"
          } > keystore.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Verify the APK is signed
        run: |
          BT=$ANDROID_HOME/build-tools/36.0.0
          $BT/apksigner verify --print-certs app/build/outputs/apk/release/Keyo.apk

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/release/Keyo.apk "Keyo-${GITHUB_REF_NAME#v}.apk"
          gh release create "$GITHUB_REF_NAME" "Keyo-${GITHUB_REF_NAME#v}.apk" \
            --title "Keyo ${GITHUB_REF_NAME#v}" \
            --generate-notes
